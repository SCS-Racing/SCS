<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Grid - Minimalist Line-Up (80 Drivers)</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body {
      background-color: #15151e;
      color: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
    }
    /* Grid für den Monitor */
    .f1-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
      padding: 24px;
      background-color: #15151e;
    }
    /* Grid für das exportierte PNG Poster */
    .f1-grid-export {
      grid-template-columns: repeat(8, 1fr) !important;
      width: 1200px !important;
    }
    /* Überarbeiteter, absolut krisensicherer Karten-Look */
    .f1-card {
      aspect-ratio: 3 / 4;
      border-radius: 6px;
      padding: 12px 6px;
      display: flex;
      /* Dreht die Render-Reihenfolge um: Nummer orientiert sich nach unten, Name nach oben */
      flex-direction: column-reverse; 
      justify-content: flex-end; 
      align-items: center;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }
    .f1-name {
      font-weight: 900;
      text-transform: uppercase;
      text-align: center;
      /* Flexiblere Schriftgröße, leicht verkleinert für den oberen Rand */
      font-size: clamp(0.7rem, 2vw, 0.8rem); 
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: rgba(255, 255, 255, 0.95);
      width: 100%;
      margin-bottom: auto; /* Schiebt den Namen sanft nach oben, hält aber Abstand */
      padding-top: 4px;
      word-wrap: break-word;
      white-space: normal;
    }
    .f1-number {
      font-size: 3.8rem; /* Minimal angepasst für optimales Platzverhältnis */
      font-weight: 900;
      font-style: italic;
      text-align: center;
      line-height: 0.9;
      letter-spacing: -0.05em;
      text-shadow: 0 4px 8px rgba(0,0,0,0.6);
      margin-top: auto; /* Verankert die Nummer fest unten */
      padding-bottom: 4px;
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <div x-data="racingGrid()">
    
    <!-- HEADER -->
    <div style="border-bottom: 4px solid #e10600; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
      <div>
        <h1 style="font-size: 2.2rem; font-weight: 900; font-style: italic; margin: 0; letter-spacing: -0.05em;">DRIVER LINE-UP <span style="color: #e10600;">2026</span></h1>
        <p style="color: #94a3b8; text-transform: uppercase; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; margin: 5px 0 0 0;">Startnummernübersicht // <span x-text="fahrer.length + ' Startplätze gesamt'"></span></p>
      </div>
      
      <div style="display: flex; gap: 15px; align-items: center;">
        <input 
          type="text" 
          x-model="suchBegriff" 
          placeholder="SUCHEN (NAME ODER NR)..." 
          style="background: #1f1f2a; color: white; border: none; border-bottom: 2px solid #475569; padding: 10px 20px; font-weight: bold; outline: none;"
        >
        
        <button 
          @click="exportToPNG()" 
          style="background: #e10600; color: white; font-weight: 800; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase;"
        >
          PNG Exportieren 📸
        </button>
      </div>
    </div>

    <!-- POSTER GRID -->
    <div class="f1-grid" id="poster-grid">
      <template x-for="f in gefilterteFahrer" :key="f.nummer + f.name">
        <div class="f1-card" :style="f.name === 'FREI' ? 'background-color: #1f1f2a;' : 'background-color: ' + f.farbe">
          <!-- Die Reihenfolge im HTML ist wegen column-reverse umgedreht, damit das Layout bombenfest hält -->
          <div class="f1-number" x-text="f.nummer" :style="f.name === 'FREI' ? 'color: rgba(255,255,255,0.15);' : 'color: #ffffff;'"></div>
          <div class="f1-name" x-text="f.name" :style="f.name === 'FREI' ? 'color: rgba(255,255,255,0.3); font-weight: 500;' : ''"></div>
        </div>
      </template>
    </div>

  </div>

        get gefilterteFahrer() {
          return this.fahrer.filter(f => {
            return f.name.toLowerCase().includes(this.suchBegriff.toLowerCase()) || f.nummer.includes(this.suchBegriff);
          });
        },

        exportToPNG() {
          const gridElement = document.getElementById('poster-grid');
          gridElement.classList.add('f1-grid-export');
          
          html2canvas(gridElement, {
            backgroundColor: '#15151e',
            scale: 2.5,
            logging: false,
            windowWidth: 1300
          }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'f1-grid-80-fahrer.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            gridElement.classList.remove('f1-grid-export');
          });
        }
      }
    }
  </script>
</body>
</html>
